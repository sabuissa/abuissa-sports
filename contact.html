<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Abdulrahim Abuissa</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header>
        <nav>
            <a href="index.html" class="logo">Abdulrahim Abuissa</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="section">
            <h2>Get in Touch</h2>
            <p>If you'd like to get in touch, fill out the form below or reach me directly by email.</p>

            <form class="contact-form" action="https://oim.zhili.dev/echo/view" method="POST">
                <div class="form-row">
                    <div class="form-field">
                        <label for="firstname">First Name</label>
                        <input type="text" id="firstname" name="firstname" required>
                    </div>
                    <div class="form-field">
                        <label for="lastname">Last Name</label>
                        <input type="text" id="lastname" name="lastname" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-field">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-field">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" name="phone">
                    </div>
                </div>

                <div class="form-field">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>

                <button type="submit" class="btn">Send Message</button>
            </form>

            <div class="contact-info">
                <p>Email: <a href="mailto:abdulrahim@abuissa.com">abdulrahim@abuissa.com</a></p>
                <div class="social-links">
                    <a href="https://www.instagram.com/abdulrahimabuissa/" target="_blank" class="social-btn"><i class="fa-brands fa-instagram"></i> Instagram</a>
                    <a href="https://www.linkedin.com/in/abdulrahim-abuissa-810137219/" target="_blank" class="social-btn"><i class="fa-brands fa-linkedin"></i> LinkedIn</a>                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Abdulrahim Abuissa</p>
    </footer>

</body>
</html>
